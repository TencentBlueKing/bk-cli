name: job
gateway_name: bk-job
description: "BlueKing Job platform (BK-JOB) commands"
actions:
  - name: get_job_instance_status
    description: "Query job instance execution status"
    method: GET
    path: "/api/v3/get_job_instance_status"
    authConfig:
      appVerifiedRequired: true
      userVerifiedRequired: true
      resourcePermissionRequired: true
    params:
      - name: bk_biz_id
        in: query
        type: int
        description: "Business ID"
        required: true
      - name: job_instance_id
        in: query
        type: int
        description: "Job instance ID"
        required: true
      - name: return_ip_result
        in: query
        type: bool
        description: "Whether to return per-host execution results"
        required: false
        default: "false"
    examples:
      - "bk-cli job get_job_instance_status --bk_biz_id 2 --job_instance_id 100"
      - "bk-cli job get_job_instance_status --bk_biz_id 2 --job_instance_id 100 --return_ip_result"

  - name: get_job_instance_ip_log
    description: "Query job execution log for a specific host"
    method: GET
    path: "/api/v3/get_job_instance_ip_log"
    authConfig:
      appVerifiedRequired: true
      userVerifiedRequired: true
      resourcePermissionRequired: true
    params:
      - name: bk_biz_id
        in: query
        type: int
        description: "Business ID"
        required: true
      - name: job_instance_id
        in: query
        type: int
        description: "Job instance ID"
        required: true
      - name: step_instance_id
        in: query
        type: int
        description: "Step instance ID"
        required: true
      - name: bk_cloud_id
        in: query
        type: int
        description: "Cloud area ID"
        required: true
      - name: ip
        in: query
        type: string
        description: "Host IP address"
        required: true
    examples:
      - "bk-cli job get_job_instance_ip_log --bk_biz_id 2 --job_instance_id 100 --step_instance_id 200 --bk_cloud_id 0 --ip 10.0.0.1"
