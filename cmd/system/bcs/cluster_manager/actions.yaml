- name: delete_nodes_from_cluster
  description: Remove specified node IPs from a cluster.
  method: DELETE
  path: "/clustermanager/v1/cluster/{clusterID}/node"
  authConfig:
    appVerifiedRequired: true
    userVerifiedRequired: false
    resourcePermissionRequired: true
  params:
  - name: clusterID
    in: path
    type: string
    description: "[path_param parameter] Cluster ID (scale-down target cluster, such as BCS-K8S-12345). This parameter is passed in the URL path, please replace with the specific cluster ID"
    required: true
  - name: nodes
    in: query
    type: string
    description: List of IPs that need to be reduced, separated by characters ','
    required: false
  - name: deleteMode
    in: query
    type: string
    description: Delete mode, RETAIN (remove the cluster, but retain the host), TERMINATE (only supports pay-as-you-go machines), the default is RETAIN
    required: false
  - name: isForce
    in: query
    type: bool
    description: Forcibly delete the node regardless of its state, such as just initialized, NotReady, etc.
    required: false
  - name: operator
    in: query
    type: string
    description: Operator
    required: false
  - name: onlyDeleteInfo
    in: query
    type: bool
    description: Defaults to false. When set to true, only the information recorded by cluster-manager will be deleted and no automated process will be triggered.
    required: false
  - name: nodeTemplateID
    in: query
    type: string
    description: The associated node template ID
    required: false
  - name: nodeGroupID
    in: query
    type: string
    description: To remove a third-party node, you need to associate it with the node pool ID.
    required: false
  - name: isExternalNode
    in: query
    type: bool
    description: Whether it is a third-party node (IDC node). To remove a third-party node, it must be set to true and must be associated with nodeGroupID
    required: false
  examples:
  - bk-cli bcs cluster_manager delete_nodes_from_cluster --clusterID BCS-K8S-12345
- name: batch_delete_nodes_from_cluster
  description: Batch remove cluster nodes, including manual, autoscaling, and third-party nodes.
  method: DELETE
  path: "/clustermanager/v1/clusters/{clusterID}/nodes/-/batch"
  authConfig:
    appVerifiedRequired: true
    userVerifiedRequired: false
    resourcePermissionRequired: true
  params:
  - name: clusterID
    in: path
    type: string
    description: "[path_param parameter] Cluster ID (scale-down target cluster, such as BCS-K8S-12345). This parameter is passed in the URL path, please replace with the specific cluster ID"
    required: true
  - name: nodeIPs
    in: query
    type: string
    description: List of IPs that need to be reduced, separated by characters ','
    required: false
  - name: virtualNodeIDs
    in: query
    type: string
    description: List of virtual nodes that need to be reduced, separated by characters ','
    required: false
  - name: operator
    in: query
    type: string
    description: Operator
    required: false
  - name: deleteMode
    in: query
    type: string
    description: Delete mode, retain (remove cluster nodes, but retain the host), terminate (only supports pay-as-you-go machines), the default is RETAIN
    required: false
  examples:
  - bk-cli bcs cluster_manager batch_delete_nodes_from_cluster --clusterID BCS-K8S-12345
- name: add_subnet_to_cluster
  description: Add subnet resources to a cluster for Tencent Cloud VPC-CNI.
  method: POST
  path: "/clustermanager/v1/clusters/{clusterID}/subnets"
  authConfig:
    appVerifiedRequired: true
    userVerifiedRequired: false
    resourcePermissionRequired: true
  params:
  - name: clusterID
    in: path
    type: string
    description: "[path_param parameter] Cluster ID (such as BCS-K8S-12345). Note: This parameter is passed in the URL path, please replace it with the specific cluster ID in the request path"
    required: true
  body_required: true
  body_schema: |-
    {
      "type": "object",
      "title": "AddSubnetToClusterReq",
      "required": [
        "clusterID",
        "subnet"
      ],
      "properties": {
        "subnet": {
          "type": "object",
          "properties": {
            "new": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "mask": {
                    "type": "integer",
                    "format": "int64",
                    "description": "The network mask size when applying for vpc-cni network subnet"
                  },
                  "zone": {
                    "type": "string",
                    "description": "Availability zone under region when applying for vpc-cni network subnet"
                  },
                  "ipCnt": {
                    "type": "integer",
                    "format": "int64",
                    "description": "Number of IPs when applying for vpc-cni network subnet"
                  }
                }
              },
              "description": "Apply for subnet in VPC-CNI network mode"
            },
            "existed": {
              "type": "object",
              "properties": {
                "ids": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  },
                  "description": "Use existing subnet IDs directly"
                }
              }
            }
          }
        },
        "operator": {
          "type": "string"
        },
        "clusterID": {
          "type": "string"
        }
      },
      "description": "Cluster add subnet request"
    }
  examples:
  - bk-cli bcs cluster_manager add_subnet_to_cluster --clusterID BCS-K8S-12345 --body '{"clusterID":"BCS-K8S-12345","subnet":{"new":[{"mask":1,"zone":"string","ipCnt":1}],"existed":{"ids":["string"]}}}'
