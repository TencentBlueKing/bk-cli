- name: add_nodes_to_cluster_v2
  description: Add node IPs to a cluster and trigger automation.
  method: POST
  path: "/clustermanager/v2/cluster/{clusterID}/node"
  authConfig:
    appVerifiedRequired: true
    userVerifiedRequired: false
    resourcePermissionRequired: true
  params:
  - name: clusterID
    in: path
    type: string
    description: "[path_param parameter] Cluster ID (expansion target cluster, such as BCS-K8S-12345). This parameter is passed in the URL path, please replace with the specific cluster ID"
    required: true
  body_required: true
  body_schema: |-
    {
      "type": "object",
      "title": "AddNodesRequestV2",
      "required": [
        "clusterID",
        "nodes"
      ],
      "properties": {
        "login": {
          "type": "object",
          "properties": {
            "keyPair": {
              "type": "object",
              "properties": {
                "keyID": {
                  "type": "string",
                  "description": "Key ID, required field"
                },
                "keyPublic": {
                  "type": "string",
                  "description": "key public key information (base64 storage)"
                },
                "keySecret": {
                  "type": "string",
                  "description": "key private key information (base64 storage)"
                }
              }
            },
            "initLoginPassword": {
              "type": "string",
              "description": "The password is initially set for the new instance. If it is not set, the system will automatically generate it."
            },
            "initLoginUsername": {
              "type": "string",
              "description": "New instance initial setting username"
            }
          }
        },
        "nodes": {
          "type": "array",
          "items": {
            "type": "string"
          },
          "description": "Expanded cluster node IP address"
        },
        "advance": {
          "type": "object",
          "properties": {
            "nodeOs": {
              "type": "string",
              "description": "You can set a custom node image when putting a node on the shelf, and reuse the cluster image when not setting it."
            },
            "isGPUNode": {
              "type": "boolean",
              "description": "Whether GPU node"
            }
          }
        },
        "operator": {
          "type": "string"
        },
        "clusterID": {
          "type": "string",
          "description": "Expanded cluster ID"
        },
        "nodeGroupID": {
          "type": "string",
          "description": "If the expansion node needs to join a NodeGroup, it needs to fill in the association ID."
        },
        "isExternalNode": {
          "type": "boolean",
          "title": "Whether it is a third-party node (IDC node)",
          "description": "The third-party node to be listed needs to be set to true and must be associated with nodeGroupID"
        },
        "nodeTemplateID": {
          "type": "string",
          "description": "Associated node template ID"
        },
        "onlyCreateInfo": {
          "type": "boolean",
          "description": "Only write node information, the default is false. When only writing node information, the node information will be queried through the cloudprovider to which the cluster belongs and set to RUNNING."
        },
        "initLoginPassword": {
          "type": "string",
          "description": "Initial password when reinstalling, can be empty"
        }
      },
      "description": "Expand the specified cluster! Notice! If the expanded machine is Tencent Cloud CVM, the system will be reinstalled by default, and bidding and billing type machines cannot be used."
    }
  examples:
  - bk-cli bcs cluster_manager add_nodes_to_cluster_v2 --clusterID BCS-K8S-12345 --body '{"clusterID":"BCS-K8S-12345","nodes":["string"]}'
- name: clean_nodes_in_group_v2
  description: Remove node IPs from a node group via query parameters and recycle resources.
  method: DELETE
  path: "/clustermanager/v2/nodegroup/{nodeGroupID}/groupnode"
  authConfig:
    appVerifiedRequired: true
    userVerifiedRequired: false
    resourcePermissionRequired: true
  params:
  - name: nodeGroupID
    in: path
    type: string
    description: "[path_param parameter] Node group ID. Passed in the URL path, replace it with a specific value in the request path."
    required: true
  - name: clusterID
    in: query
    type: string
    description: Cluster ID
    required: false
  - name: nodes
    in: query
    type: string
    description: The IP list that needs to be cleaned and recycled is separated by ','
    required: false
  - name: operator
    in: query
    type: string
    description: Operator
    required: false
  examples:
  - bk-cli bcs cluster_manager clean_nodes_in_group_v2 --nodeGroupID node-group-id
