- name: import_cluster
  description: Import a user cluster by cluster ID or kubeconfig.
  method: POST
  path: "/clustermanager/v1/cluster/import"
  authConfig:
    appVerifiedRequired: true
    userVerifiedRequired: false
    resourcePermissionRequired: true
  body_required: true
  body_schema: |-
    {
      "type": "object",
      "title": "ImportClusterReq",
      "required": [
        "clusterName",
        "provider",
        "projectID",
        "businessID",
        "environment",
        "engineType",
        "isExclusive",
        "clusterType",
        "creator"
      ],
      "properties": {
        "area": {
          "type": "object",
          "properties": {
            "bkCloudID": {
              "type": "integer",
              "format": "int64",
              "description": "Cloud region ID"
            },
            "bkCloudName": {
              "type": "string",
              "description": "Cloud region name"
            }
          }
        },
        "labels": {
          "type": "object",
          "additionalProperties": {
            "type": "string"
          }
        },
        "region": {
          "type": "string",
          "description": "The region where the cluster is located"
        },
        "creator": {
          "type": "string"
        },
        "version": {
          "type": "string",
          "description": "Import cluster version information"
        },
        "provider": {
          "type": "string",
          "description": "Cloud template ID, process management by the cloud to which the cluster belongs"
        },
        "accountID": {
          "type": "string",
          "description": "Import the cloud credential information associated with the cluster, which can be empty; when it is empty, the cloud credential information can be obtained through the cloud."
        },
        "cloudMode": {
          "type": "object",
          "title": "ImportCloudMode",
          "properties": {
            "inter": {
              "type": "boolean",
              "description": "The default is to import via the external network. When it is true, it will be imported via the intranet. This field only takes effect for cloud import."
            },
            "cloudID": {
              "type": "string",
              "description": "Cloud cluster ID (for example: Tencent Cloud: cls-xxx)"
            },
            "nodeIps": {
              "type": "array",
              "items": {
                "type": "string"
              },
              "description": "The cluster Master or node IP list needs to be managed on the Blue Whale platform in advance. Implement cluster management through reverse proxy"
            },
            "kubeConfig": {
              "type": "string",
              "description": "Cluster kubeConfig file"
            },
            "resourceGroup": {
              "type": "string",
              "description": "The resource group where the cluster is located (azure cloud)"
            }
          },
          "description": "Cloud provider imports cluster mode"
        },
        "clusterID": {
          "type": "string",
          "description": "Cluster ID, such as BCS-K8S-000000 (specify clusterID directly when entering information manually, automatic import will generate cluster ID by default)"
        },
        "extraInfo": {
          "type": "object",
          "additionalProperties": {
            "type": "string"
          }
        },
        "is_shared": {
          "type": "boolean",
          "description": "Whether it is a shared cluster, default false"
        },
        "projectID": {
          "type": "string",
          "description": "BCS project unique identifier, 32-digit hexadecimal string (such as MD5). Difference from projectCode: projectID is the API internal identifier, and projectCode is the human-readable English encoding of the project."
        },
        "businessID": {
          "type": "string",
          "description": "CMDB business ID"
        },
        "engineType": {
          "type": "string",
          "description": "Engine type, default k8s"
        },
        "manageType": {
          "type": "string",
          "description": "Cluster management type, effective in public cloud, MANAGED_CLUSTER (cluster hosted on the cloud), the default is INDEPENDENT_CLUSTER (independent cluster, self-maintained)"
        },
        "clusterName": {
          "type": "string"
        },
        "clusterType": {
          "type": "string",
          "description": "Cluster type, for example [federation, single], federation represents a federated cluster, single represents an independent cluster, the default is single"
        },
        "description": {
          "type": "string",
          "description": "Brief description of the cluster"
        },
        "environment": {
          "type": "string",
          "description": "Cluster environment, such as [prod, debug, stag]"
        },
        "isExclusive": {
          "type": "boolean",
          "description": "Whether it is a business exclusive cluster, the default is true"
        },
        "networkType": {
          "type": "string",
          "description": "Cluster network type (underlay/overlay), the default is overlay"
        },
        "extraClusterID": {
          "type": "string",
          "description": "Import additional cluster ID identification information of the cluster, default time and space value"
        },
        "clusterCategory": {
          "type": "string",
          "description": "Cluster category, mainly used to distinguish whether the cluster is self-built or imported (builder/importer), the default is self-built"
        }
      },
      "description": "The user's existing cluster is imported into BCS for management."
    }
