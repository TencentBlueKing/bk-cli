id: SYSGO-003
name: devops pipeline stop_build success
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: stop build
    command:
      - devops
      - pipeline
      - stop_build
      - --projectId
      - demo
      - --pipelineId
      - pipe-1
      - --buildId
      - build-1
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /devops/prod/v4/apigw-user/projects/demo/build_stop
        - path: data.query.pipelineId
          equals: pipe-1
        - path: data.query.buildId
          equals: build-1