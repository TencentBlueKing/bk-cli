id: DEVOPS-009
name: devops codecc get_task_detail happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get_task_detail
    command:
      - devops
      - codecc
      - get_task_detail
      - --taskId
      - "123456789"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /devops/prod/apigw-user/codecc/task/detail
        - path: data.query.taskId
          equals: "123456789"