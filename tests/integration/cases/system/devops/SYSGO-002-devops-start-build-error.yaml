id: SYSGO-002
name: devops pipeline start_build upstream failure
tags:
  - coverage-system_go
  - suite-integration
  - uses-mock
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: start build with mock failure
    command:
      - devops
      - pipeline
      - start_build
      - --projectId
      - demo
      - --pipelineId
      - pipe-1
      - --header
      - X-Mock-Scenario:SYSGO-002
    expect:
      exit_code: 0
      category: mock_mismatch
      checks:
        - path: status
          equals: 500
        - path: data.error
          equals: pipeline_start_failed
