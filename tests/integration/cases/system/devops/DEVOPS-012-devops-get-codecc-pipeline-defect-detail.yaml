id: DEVOPS-012
name: devops codecc get_pipeline_defect_detail happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get_pipeline_defect_detail
    command:
      - devops
      - codecc
      - get_pipeline_defect_detail
      - --pipelineId
      - p-1
      - --buildId
      - b-1
      - --dimension
      - STANDARD
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /devops/prod/apigw-user/codecc/pipeline/defect/list
        - path: data.query.pipelineId
          equals: p-1
        - path: data.query.dimension
          equals: STANDARD