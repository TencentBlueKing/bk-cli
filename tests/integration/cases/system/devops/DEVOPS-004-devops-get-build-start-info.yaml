id: DEVOPS-004
name: devops pipeline get_build_start_info happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get build start info
    command:
      - devops
      - pipeline
      - get_build_start_info
      - --projectId
      - demo
      - --pipelineId
      - pipe-1
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /devops/prod/v4/apigw-user/projects/demo/build_manual_startup_info
        - path: data.query.pipelineId
          equals: pipe-1
