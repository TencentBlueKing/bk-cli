id: DEVOPS-008
name: devops pipeline get_view_pipelines happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get_view_pipelines
    command:
      - devops
      - pipeline
      - get_view_pipelines
      - --projectId
      - demo
      - --filterByPipelineName
      - release
      - --viewId
      - allPipeline
      - --page
      - "2"
      - --pageSize
      - "10"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /devops/prod/v4/apigw-user/projects/demo/pipelineView/listViewPipelines
        - path: data.query.filterByPipelineName
          equals: release
        - path: data.query.viewId
          equals: allPipeline
        - path: data.query.page
          equals: "2"