---
id: BCS-032
name: bcs cluster_manager update_virtual_cluster_quota happy path
tags:
- coverage-system_yaml
- suite-integration
steps:
- name: init mock-backed context
  command:
  - context
  - init
  - "--bk_api_url_tmpl"
  - "${MOCK_API_BASE_URL}/{gateway_name}"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: login
  command:
  - auth
  - login
  - "--access_token"
  - integration-token
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: update_virtual_cluster_quota
  command:
  - bcs
  - cluster_manager
  - update_virtual_cluster_quota
  - "--clusterID"
  - BCS-K8S-12345
  - "--body"
  - '{"clusterID":"BCS-K8S-12345","quota":{"cpuLimits":"string","cpuRequests":"string","memoryLimits":"string"}}'
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
    - path: status
      equals: 200
    - path: data.gateway
      equals: bcs-api-gateway
    - path: data.method
      equals: PUT
    - path: data.path
      contains: "/bcs-api-gateway/prod/clustermanager/v1/vcluster/BCS-K8S-12345/quota"
    - path: data.body
      kind: map
