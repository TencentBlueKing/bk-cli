---
id: BCS-024
name: bcs cluster_manager clean_nodes_in_group happy path
tags:
- coverage-system_yaml
- suite-integration
steps:
- name: init mock-backed context
  command:
  - context
  - init
  - "--bk_api_url_tmpl"
  - "${MOCK_API_BASE_URL}/{gateway_name}"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: login
  command:
  - auth
  - login
  - "--access_token"
  - integration-token
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: clean_nodes_in_group
  command:
  - bcs
  - cluster_manager
  - clean_nodes_in_group
  - "--nodeGroupID"
  - node-group-id
  - "--body"
  - '{"clusterID":"BCS-K8S-12345","nodeGroupID":"node-group-id","nodes":["string"],"operator":"admin"}'
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
    - path: status
      equals: 200
    - path: data.gateway
      equals: bcs-api-gateway
    - path: data.method
      equals: DELETE
    - path: data.path
      contains: "/bcs-api-gateway/prod/clustermanager/v1/nodegroup/node-group-id/groupnode"
    - path: data.body
      kind: map
