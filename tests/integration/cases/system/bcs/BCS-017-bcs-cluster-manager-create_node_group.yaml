---
id: BCS-017
name: bcs cluster_manager create_node_group happy path
tags:
- coverage-system_yaml
- suite-integration
steps:
- name: init mock-backed context
  command:
  - context
  - init
  - "--bk_api_url_tmpl"
  - "${MOCK_API_BASE_URL}/{gateway_name}"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: login
  command:
  - auth
  - login
  - "--access_token"
  - integration-token
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: create_node_group
  command:
  - bcs
  - cluster_manager
  - create_node_group
  - "--body"
  - '{"name":"string","clusterID":"BCS-K8S-12345","region":"string","autoScaling":{"vpcID":"string","zones":["string"],"maxSize":1},"launchTemplate":{"CPU":1,"GPU":1,"Mem":1},"creator":"string","nodeOS":"string"}'
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
    - path: status
      equals: 200
    - path: data.gateway
      equals: bcs-api-gateway
    - path: data.method
      equals: POST
    - path: data.path
      contains: "/bcs-api-gateway/prod/clustermanager/v1/nodegroup"
    - path: data.body
      kind: map
