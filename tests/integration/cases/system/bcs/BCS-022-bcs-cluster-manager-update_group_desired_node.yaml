---
id: BCS-022
name: bcs cluster_manager update_group_desired_node happy path
tags:
- coverage-system_yaml
- suite-integration
steps:
- name: init mock-backed context
  command:
  - context
  - init
  - "--bk_api_url_tmpl"
  - "${MOCK_API_BASE_URL}/{gateway_name}"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: login
  command:
  - auth
  - login
  - "--access_token"
  - integration-token
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: update_group_desired_node
  command:
  - bcs
  - cluster_manager
  - update_group_desired_node
  - "--nodeGroupID"
  - node-group-id
  - "--body"
  - '{"nodeGroupID":"node-group-id","desiredNode":1,"operator":"admin"}'
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
    - path: status
      equals: 200
    - path: data.gateway
      equals: bcs-api-gateway
    - path: data.method
      equals: POST
    - path: data.path
      contains: "/bcs-api-gateway/prod/clustermanager/v1/nodegroup/node-group-id/desirednode"
    - path: data.body
      kind: map
