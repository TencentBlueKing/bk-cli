---
id: BCS-034
name: bcs cluster_manager clean_nodes_in_group_v2 happy path
tags:
- coverage-system_yaml
- suite-integration
steps:
- name: init mock-backed context
  command:
  - context
  - init
  - "--bk_api_url_tmpl"
  - "${MOCK_API_BASE_URL}/{gateway_name}"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: login
  command:
  - auth
  - login
  - "--access_token"
  - integration-token
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: clean_nodes_in_group_v2
  command:
  - bcs
  - cluster_manager
  - clean_nodes_in_group_v2
  - "--nodeGroupID"
  - node-group-id
  - "--clusterID"
  - BCS-K8S-12345
  - "--nodes"
  - 10.0.0.1,10.0.0.2
  - "--operator"
  - admin
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
    - path: status
      equals: 200
    - path: data.gateway
      equals: bcs-api-gateway
    - path: data.method
      equals: DELETE
    - path: data.path
      contains: "/bcs-api-gateway/prod/clustermanager/v2/nodegroup/node-group-id/groupnode"
    - path: data.query.clusterID
      equals: BCS-K8S-12345
    - path: data.body
      kind: 'null'
