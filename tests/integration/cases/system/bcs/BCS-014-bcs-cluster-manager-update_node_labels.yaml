---
id: BCS-014
name: bcs cluster_manager update_node_labels happy path
tags:
- coverage-system_yaml
- suite-integration
steps:
- name: init mock-backed context
  command:
  - context
  - init
  - "--bk_api_url_tmpl"
  - "${MOCK_API_BASE_URL}/{gateway_name}"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: login
  command:
  - auth
  - login
  - "--access_token"
  - integration-token
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: update_node_labels
  command:
  - bcs
  - cluster_manager
  - update_node_labels
  - "--body"
  - '{"nodes":[{"labels":{"key":"string"},"nodeName":"string"}],"clusterID":"BCS-K8S-12345"}'
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
    - path: status
      equals: 200
    - path: data.gateway
      equals: bcs-api-gateway
    - path: data.method
      equals: PUT
    - path: data.path
      contains: "/bcs-api-gateway/prod/clustermanager/v1/node/labels"
    - path: data.body
      kind: map
