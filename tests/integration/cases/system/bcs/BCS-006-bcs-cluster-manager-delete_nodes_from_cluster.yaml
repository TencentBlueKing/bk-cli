---
id: BCS-006
name: bcs cluster_manager delete_nodes_from_cluster happy path
tags:
- coverage-system_yaml
- suite-integration
steps:
- name: init mock-backed context
  command:
  - context
  - init
  - "--bk_api_url_tmpl"
  - "${MOCK_API_BASE_URL}/{gateway_name}"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: login
  command:
  - auth
  - login
  - "--access_token"
  - integration-token
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
- name: delete_nodes_from_cluster
  command:
  - bcs
  - cluster_manager
  - delete_nodes_from_cluster
  - "--clusterID"
  - BCS-K8S-12345
  - "--nodes"
  - 10.0.0.1,10.0.0.2
  - "--deleteMode"
  - terminate
  - "--isForce=true"
  - "--operator"
  - admin
  - "--onlyDeleteInfo=true"
  - "--nodeTemplateID"
  - node-template-id
  - "--nodeGroupID"
  - node-group-id
  - "--isExternalNode=true"
  expect:
    exit_code: 0
    checks:
    - path: ok
      equals: true
    - path: status
      equals: 200
    - path: data.gateway
      equals: bcs-api-gateway
    - path: data.method
      equals: DELETE
    - path: data.path
      contains: "/bcs-api-gateway/prod/clustermanager/v1/cluster/BCS-K8S-12345/node"
    - path: data.query.nodes
      equals: 10.0.0.1,10.0.0.2
    - path: data.body
      kind: 'null'
