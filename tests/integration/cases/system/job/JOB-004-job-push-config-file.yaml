id: JOB-004
name: job push_config_file happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: push config file
    command:
      - job
      - push_config_file
      - --body
      - '{"bk_biz_id":2,"file_list":[{"file_name":"app.conf","content":"aGVsbG8="}],"file_target_path":"/etc/demo","target_server":{"host_id_list":[1]}}'
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.body.file_list.0.file_name
          equals: app.conf
        - path: data.body.file_target_path
          equals: /etc/demo
