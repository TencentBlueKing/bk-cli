id: JOB-NEG-001
name: job fast_execute_script upstream failure
tags:
  - coverage-system_go
  - suite-integration
  - uses-mock
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: fast execute script with mock failure
    command:
      - job
      - fast_execute_script
      - --bk_biz_id
      - "2"
      - --script_content
      - echo fail
      - --script_language
      - shell
      - --target_server
      - '{"host_id_list":[1]}'
      - --header
      - X-Mock-Scenario:JOB-NEG-001
    expect:
      exit_code: 0
      checks:
        - path: status
          equals: 502
        - path: data.error
          equals: job_dispatch_failed
