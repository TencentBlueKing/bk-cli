id: JOB-003
name: job fast_transfer_file happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: fast transfer file
    command:
      - job
      - fast_transfer_file
      - --body
      - '{"bk_biz_id":2,"file_source_list":[{"files":["/tmp/demo.txt"],"account_alias":"root","host_id":1}],"file_target_path":"/tmp","target_server":{"host_id_list":[1]}}'
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /bk-job/prod/api/v3/fast_transfer_file
        - path: data.body.bk_biz_id
          equals: 2
        - path: data.body.file_target_path
          equals: /tmp
