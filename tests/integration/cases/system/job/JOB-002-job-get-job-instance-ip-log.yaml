id: JOB-002
name: job get_job_instance_ip_log happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get job instance ip log
    command:
      - job
      - get_job_instance_ip_log
      - --bk_biz_id
      - "2"
      - --job_instance_id
      - "100"
      - --step_instance_id
      - "200"
      - --bk_cloud_id
      - "0"
      - --ip
      - 10.0.0.1
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.query.step_instance_id
          equals: "200"
        - path: data.query.ip
          equals: 10.0.0.1
