id: SOPS-001
name: sops get_template_list happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get template list
    command:
      - sops
      - get_template_list
      - --bk_biz_id
      - "2"
      - --name_keyword
      - deploy
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /bk-sops/prod/get_template_list/2/
        - path: data.query.name_keyword
          equals: deploy
