id: SOPS-006
name: sops start_task happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: start task
    command:
      - sops
      - start_task
      - --bk_biz_id
      - "2"
      - --task_id
      - "100"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /bk-sops/prod/start_task/100/2/
        - path: data.body
          equals: {}
