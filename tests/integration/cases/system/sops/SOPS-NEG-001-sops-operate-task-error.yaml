id: SOPS-NEG-001
name: sops operate_task upstream failure
tags:
  - coverage-system_go
  - suite-integration
  - uses-mock
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: operate task with mock failure
    command:
      - sops
      - operate_task
      - --bk_biz_id
      - "2"
      - --task_id
      - "100"
      - --action
      - revoke
      - --header
      - X-Mock-Scenario:SOPS-NEG-001
    expect:
      exit_code: 0
      checks:
        - path: status
          equals: 409
        - path: data.error
          equals: task_operation_rejected
