id: APIGW-002
name: apigateway list_gateway_apis happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: list gateway apis
    command:
      - apigateway
      - list_gateway_apis
      - --gateway_name
      - bk-iam
      - --keyword
      - system
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: status
          equals: 200
        - path: data.items.0.gateway_name
          equals: bk-iam
        - path: data.items.0.keyword
          equals: system
