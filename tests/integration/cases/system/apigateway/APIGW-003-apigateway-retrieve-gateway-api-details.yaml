id: APIGW-003
name: apigateway retrieve_gateway_api_details happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: retrieve gateway api details
    command:
      - apigateway
      - retrieve_gateway_api_details
      - --gateway_name
      - bk-iam
      - --api_name
      - create_system
      - --stage_name
      - prod
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: status
          equals: 200
        - path: data.gateway_name
          equals: bk-iam
        - path: data.api_name
          equals: create_system
        - path: data.stage_name
          equals: prod
