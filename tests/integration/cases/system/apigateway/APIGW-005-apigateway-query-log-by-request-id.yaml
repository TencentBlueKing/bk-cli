id: APIGW-005
name: apigateway query_log_by_request_id via yaml action
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: query log by request id
    command:
      - apigateway
      - query_log_by_request_id
      - --request_id
      - test-request-123
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: status
          equals: 200
