id: NODEMAN-002
name: nodeman get_job_details happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get job details
    command:
      - nodeman
      - get_job_details
      - --job_id
      - "123"
      - --page
      - "2"
      - --pagesize
      - "50"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /bk-nodeman/prod/api/job/123/details/
        - path: data.body.page
          equals: 2
        - path: data.body.pagesize
          equals: 50
