id: NODEMAN-001
name: nodeman install_job happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: install job
    command:
      - nodeman
      - install_job
      - --body
      - '{"job_type":"INSTALL_AGENT","bk_cloud_id":0,"hosts":[{"ip":"10.0.0.1"}]}'
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /bk-nodeman/prod/api/job/install/
        - path: data.body.job_type
          equals: INSTALL_AGENT
