id: NODEMAN-NEG-001
name: nodeman install_job upstream failure
tags:
  - coverage-system_go
  - suite-integration
  - uses-mock
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: install job with mock failure
    command:
      - nodeman
      - install_job
      - --body
      - '{"job_type":"INSTALL_AGENT","bk_cloud_id":0,"hosts":[{"ip":"10.0.0.1"}]}'
      - --header
      - X-Mock-Scenario:NODEMAN-NEG-001
    expect:
      exit_code: 0
      checks:
        - path: status
          equals: 500
        - path: data.error
          equals: install_job_failed
