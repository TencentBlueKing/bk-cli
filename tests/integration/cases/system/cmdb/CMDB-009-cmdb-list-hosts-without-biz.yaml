id: CMDB-009
name: cmdb list_hosts_without_biz happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: list hosts without biz
    command:
      - cmdb
      - list_hosts_without_biz
      - --host_ips
      - 10.0.0.1
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.count
          equals: 2
