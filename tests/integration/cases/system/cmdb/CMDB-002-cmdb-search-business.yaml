id: CMDB-002
name: cmdb search_business happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: search business
    command:
      - cmdb
      - search_business
      - --bk_biz_id
      - "2"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.body.condition.bk_biz_id
          equals: 2
        - path: data.body.page.limit
          equals: 500
