id: CMDB-003
name: cmdb search_set happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: search set
    command:
      - cmdb
      - search_set
      - --bk_biz_id
      - "2"
      - --bk_set_name
      - web
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.body.condition.bk_set_name
          equals: web
