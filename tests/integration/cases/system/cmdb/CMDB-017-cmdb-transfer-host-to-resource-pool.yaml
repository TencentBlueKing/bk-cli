id: CMDB-017
name: cmdb transfer_host_to_resource_pool happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: transfer host to resource pool
    command:
      - cmdb
      - transfer_host_to_resource_pool
      - --bk_biz_id
      - "2"
      - --bk_host_ids
      - 101,102
      - --bk_module_id
      - "999"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.body.bk_module_id
          equals: 999
        - path: data.body.bk_host_id.0
          equals: 101
