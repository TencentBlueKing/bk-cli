id: CMDB-004
name: cmdb create_set happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: create set
    command:
      - cmdb
      - create_set
      - --bk_biz_id
      - "2"
      - --bk_set_name
      - web
      - --bk_set_env
      - "3"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.body.bk_parent_id
          equals: 2
        - path: data.body.bk_set_name
          equals: web
        - path: data.body.bk_set_env
          equals: "3"
