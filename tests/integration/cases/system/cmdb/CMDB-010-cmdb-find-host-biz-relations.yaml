id: CMDB-010
name: cmdb find_host_biz_relations happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: find host biz relations
    command:
      - cmdb
      - find_host_biz_relations
      - --bk_host_ids
      - 101,102
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data
          kind: list
        - path: data.0.bk_host_id
          equals: 101
