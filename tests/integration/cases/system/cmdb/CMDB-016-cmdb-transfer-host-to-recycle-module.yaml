id: CMDB-016
name: cmdb transfer_host_to_recycle_module happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: transfer host to recycle module
    command:
      - cmdb
      - transfer_host_to_recycle_module
      - --bk_biz_id
      - "2"
      - --bk_host_ids
      - 101
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /bk-cmdb/prod/api/v3/open/hosts/modules/recycle
        - path: data.body.bk_host_id.0
          equals: 101
