id: CMDB-008
name: cmdb list_biz_hosts happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: list biz hosts
    command:
      - cmdb
      - list_biz_hosts
      - --bk_biz_id
      - "2"
      - --host_ips
      - 10.0.0.1
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.count
          equals: 2
        - path: data.echo.body.host_property_filter.rules.0.value.0
          equals: 10.0.0.1
