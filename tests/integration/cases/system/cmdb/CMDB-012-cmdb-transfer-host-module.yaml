id: CMDB-012
name: cmdb transfer_host_module happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: transfer host module
    command:
      - cmdb
      - transfer_host_module
      - --bk_biz_id
      - "2"
      - --bk_host_ids
      - 101,102
      - --bk_module_ids
      - 201,202
      - --is_increment
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.body.bk_biz_id
          equals: 2
        - path: data.body.bk_module_id.0
          equals: 201
        - path: data.body.is_increment
          equals: true
