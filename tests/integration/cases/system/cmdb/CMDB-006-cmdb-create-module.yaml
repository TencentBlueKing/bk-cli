id: CMDB-006
name: cmdb create_module happy path
tags:
  - coverage-system_go
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: create module
    command:
      - cmdb
      - create_module
      - --bk_biz_id
      - "2"
      - --bk_set_id
      - "10"
      - --bk_module_name
      - web
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.body.bk_parent_id
          equals: 10
        - path: data.body.bk_module_name
          equals: web
