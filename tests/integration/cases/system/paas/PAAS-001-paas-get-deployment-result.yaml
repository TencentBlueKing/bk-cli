id: PAAS-001
name: paas get_deployment_result happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: get deployment result
    command:
      - paas
      - get_deployment_result
      - --app_code
      - bk-demo
      - --module
      - default
      - --deployment_id
      - "12345"
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.path
          contains: /bkpaas3/prod/bkapps/applications/bk-demo/modules/default/deployments/12345/result/
