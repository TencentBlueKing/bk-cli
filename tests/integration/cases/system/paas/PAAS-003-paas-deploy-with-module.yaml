id: PAAS-003
name: paas deploy_with_module happy path
tags:
  - coverage-system_yaml
  - suite-integration
steps:
  - name: init mock-backed context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${MOCK_API_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: deploy with module
    command:
      - paas
      - deploy_with_module
      - --app_code
      - bk-demo
      - --module
      - default
      - --env
      - prod
      - --body
      - '{"revision":"commit-id","version_type":"branch","version_name":"master"}'
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.method
          equals: POST
        - path: data.path
          contains: /bkpaas3/prod/bkapps/applications/bk-demo/modules/default/envs/prod/deployments/
        - path: data.body.version_type
          equals: branch
        - path: data.body.version_name
          equals: master
        - path: data.body.revision
          equals: commit-id
