id: API-002
name: raw api dry run preview
tags:
  - coverage-api
  - suite-integration
steps:
  - name: init api context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${HTTPBIN_BASE_URL}/anything/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: preview raw api request
    command:
      - api
      - demo
      - GET
      - /preview
      - --query
      - '{"mode":"dry-run"}'
      - --dry-run
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: dry_run
          equals: true
        - path: request.url
          contains: /anything/demo/prod/preview
