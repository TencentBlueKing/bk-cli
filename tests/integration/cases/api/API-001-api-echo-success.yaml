id: API-001
name: raw api success against httpbin
tags:
  - coverage-api
  - suite-integration
steps:
  - name: init api context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${HTTPBIN_BASE_URL}/anything/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: run raw api command
    command:
      - api
      - demo
      - GET
      - /echo
      - --query
      - '{"source":"integration"}'
      - --header
      - X-Test-Scenario:API-001
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: status
          equals: 200
        - path: data.method
          equals: GET
        - path: data.args.source
          equals: integration
