id: CTX-002
name: context status and version metadata
tags:
  - coverage-context
  - suite-integration
steps:
  - name: init default context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${HTTPBIN_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: show version metadata
    command:
      - version
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.version
          equals: dev
        - path: data.commit_id
          kind: string
        - path: data.build_time
          kind: string
  - name: show active context status
    command:
      - context
      - status
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.context
          equals: default
        - path: data.bk_api_url_tmpl
          equals: http://httpbin/{gateway_name}
        - path: data.user_key
          equals: bk_token
        - path: data.timeout
          equals: 1m0s
  - name: status rejects missing context override
    command:
      - context
      - status
      - --context
      - missing
    expect:
      exit_code: nonzero
      checks:
        - path: ok
          equals: false
        - path: error.code
          equals: context_error
        - path: error.message
          contains: context "missing" not found
