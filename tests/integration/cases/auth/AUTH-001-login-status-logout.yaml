id: AUTH-001
name: auth login status logout
tags:
  - coverage-auth
  - suite-integration
steps:
  - name: init default context
    command:
      - context
      - init
      - --bk_api_url_tmpl
      - ${HTTPBIN_BASE_URL}/{gateway_name}
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: login with access token
    command:
      - auth
      - login
      - --access_token
      - integration-token
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: message
          contains: default
  - name: show auth status
    command:
      - auth
      - status
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.context
          equals: default
        - path: data.credential_type
          equals: access_token
        - path: data.has_credentials
          equals: true
  - name: logout
    command:
      - auth
      - logout
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
  - name: auth status after logout
    command:
      - auth
      - status
    expect:
      exit_code: 0
      checks:
        - path: ok
          equals: true
        - path: data.context
          equals: default
        - path: data.has_credentials
          equals: false
