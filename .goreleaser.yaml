version: 2

project_name: bk-cli

snapshot:
  version_template: "{{ .Tag }}"

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commitID={{.Commit}} -X main.buildTime={{.Date}} -X github.com/TencentBlueKing/bk-cli/internal/config.bkTEDomain={{ .Env.BK_TE_DOMAIN }}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: TencentBlueking
    name: bk-cli
  draft: false
  prerelease: auto
